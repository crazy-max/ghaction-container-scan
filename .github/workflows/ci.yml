name: ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  schedule:
    - cron: '0 10 * * *'
  push:
    branches:
      - 'master'
      - 'releases/v*'
    tags:
      - 'v*'
  pull_request:

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - alpine:3.9
          - alpine:latest
          - moby/buildkit:master
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Scan for vulnerabilities
        id: scan
        uses: ./
        with:
          image: ${{ matrix.image }}
      -
        name: JSON result
        run: cat ${{ steps.scan.outputs.json }}

  tarball:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./tests/fixtures
          outputs: type=docker,dest=/tmp/image.tar
          tags: name/app:latest
          provenance: false
      -
        name: Scan for vulnerabilities
        id: scan
        uses: ./
        with:
          tarball: /tmp/image.tar
      -
        name: JSON result
        run: cat ${{ steps.scan.outputs.json }}

  sarif:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./tests/fixtures
          outputs: type=docker,dest=/tmp/image.tar
          tags: name/app:latest
          provenance: false
      -
        name: Scan for vulnerabilities
        id: scan
        uses: ./
        with:
          tarball: /tmp/image.tar
          dockerfile: ./tests/fixtures/Dockerfile
      -
        name: SARIF result
        run: cat ${{ steps.scan.outputs.sarif }}

  annotations:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - alpine:3.9
          - alpine:latest
          - moby/buildkit:master
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Scan for vulnerabilities
        uses: ./
        with:
          image: ${{ matrix.image }}
          annotations: true

  ignore_unfixed:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Scan for vulnerabilities
        uses: ./
        with:
          image: alpine:3.9
          ignore_unfixed: true

  threshold:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - alpine:3.9
          - alpine:3.10
          - alpine:latest
          - moby/buildkit:master
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Scan for vulnerabilities
        continue-on-error: true
        uses: ./
        with:
          image: ${{ matrix.image }}
          severity_threshold: HIGH

  build-scan-push:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2.8.3@sha256:a3d8aaa63ed8681a604f1dea0aa03f100d5895b6a58ace528858a7b332415373
        ports:
          - 5000:5000
    env:
      REPO_SLUG: localhost:5000/name/app
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REPO_SLUG }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: network=host
      -
        name: Build and load
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./tests/fixtures
          load: true
          tags: ${{ steps.meta.outputs.tags }}
      -
        name: Scan for vulnerabilities
        uses: ./
        with:
          image: ${{ env.REPO_SLUG }}:${{ steps.meta.outputs.version }}
          dockerfile: ./tests/fixtures/Dockerfile
      -
        name: Build multi-platform and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./tests/fixtures
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
